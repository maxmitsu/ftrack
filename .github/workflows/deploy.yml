name: Build and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @workspace/fintrack build

      - name: Show generated files
        run: |
          echo "== repo root =="
          ls -la
          echo "== artifacts =="
          ls -la artifacts || true
          echo "== fintrack =="
          ls -la artifacts/fintrack || true
          echo "== dist =="
          ls -la artifacts/fintrack/dist || true
          echo "== dist/public =="
          ls -la artifacts/fintrack/dist/public || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/fintrack/dist/public

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
